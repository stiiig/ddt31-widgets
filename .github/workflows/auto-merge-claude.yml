name: Auto-merge Claude branches

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create and merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if PR already exists
            const prs = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'master',
              state: 'open'
            });

            let pr;
            if (prs.data.length === 0) {
              // Create PR
              const created = await github.rest.pulls.create({
                owner, repo,
                title: `[Auto] ${branch}`,
                head: branch,
                base: 'master',
                body: 'Merge automatique depuis une branche Claude.'
              });
              pr = created.data;
              console.log(`PR créée : #${pr.number}`);
            } else {
              pr = prs.data[0];
              console.log(`PR existante : #${pr.number}`);
            }

            // Attendre que GitHub calcule le statut de merge
            let merged = false;
            for (let attempt = 1; attempt <= 10; attempt++) {
              await new Promise(r => setTimeout(r, 5000));
              const prInfo = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              const state = prInfo.data.mergeable_state;
              console.log(`Tentative ${attempt}/10 — mergeable_state: ${state}`);
              if (prInfo.data.merged) { console.log('Déjà mergée.'); merged = true; break; }
              if (state === 'clean' || state === 'unstable' || state === 'has_hooks') {
                await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'squash' });
                console.log(`PR #${pr.number} mergée.`);
                merged = true;
                break;
              }
              if (state === 'dirty') {
                // Conflit dû au squash précédent — merger master dans la branche pour nettoyer
                console.log('État dirty : merge de master dans la branche pour résoudre les conflits...');
                try {
                  await github.rest.repos.merge({ owner, repo, base: branch, head: 'master', commit_message: 'Sync master into branch' });
                  console.log('Sync effectué, nouvelle tentative...');
                } catch(e) {
                  console.log(`Sync échoué: ${e.message}`);
                }
              }
            }
            if (!merged) throw new Error('Merge échoué après 10 tentatives');

            // Déclencher manuellement le deploy (GITHUB_TOKEN ne trigger pas les workflows automatiquement)
            await new Promise(r => setTimeout(r, 2000));
            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'deploy.yml',
              ref: 'master'
            });
            console.log('Deploy déclenché.');
