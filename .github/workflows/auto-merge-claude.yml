name: Auto-merge Claude branches

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy branch tree to master
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Récupérer le SHA de master et le tree de la branche
            const masterRef = await github.rest.git.getRef({ owner, repo, ref: 'heads/master' });
            const masterSha = masterRef.data.object.sha;

            const branchRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const branchSha = branchRef.data.object.sha;

            // Si déjà à jour, skip
            if (masterSha === branchSha) {
              console.log('Branche déjà à jour avec master, rien à faire.');
              return;
            }

            // Récupérer le tree de la branche
            const branchCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: branchSha });
            const treeSha = branchCommit.data.tree.sha;

            // Créer un commit sur master avec le tree de la branche
            const newCommit = await github.rest.git.createCommit({
              owner, repo,
              message: `[Auto] ${branch}`,
              tree: treeSha,
              parents: [masterSha]
            });
            console.log(`Commit créé : ${newCommit.data.sha}`);

            // Avancer master vers ce commit
            await github.rest.git.updateRef({
              owner, repo,
              ref: 'heads/master',
              sha: newCommit.data.sha,
              force: false
            });
            console.log(`master avancé à ${newCommit.data.sha}`);

            // Déclencher le deploy (GITHUB_TOKEN ne trigger pas les workflows automatiquement)
            await new Promise(r => setTimeout(r, 2000));
            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'deploy.yml',
              ref: 'master'
            });
            console.log('Deploy déclenché.');
